<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftSync Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold mb-6 text-center">SwiftSync Platform</h1>
        <form id="login-form">
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700">Username</label>
                <input type="text" id="username" class="mt-1 block w-full border border-slate-300 rounded px-3 py-2" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-700">Password</label>
                <input type="password" id="password" class="mt-1 block w-full border border-slate-300 rounded px-3 py-2" required>
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white py-2 rounded hover:bg-slate-800">Login</button>
        </form>
        <div id="error" class="mt-4 text-red-600 text-sm text-center hidden"></div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                localStorage.setItem('currentUserId', data.user.id);
                localStorage.setItem('currentUsername', data.user.username);
                localStorage.setItem('isAdmin', data.user.is_admin);
                localStorage.setItem('clientId', data.user.client_id);
                localStorage.setItem('userInvoicesLeft', data.user.invoices_left);
                window.location.href = '/';
            } catch (err) {
                document.getElementById('error').textContent = err.message;
                document.getElementById('error').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
